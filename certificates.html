#loading{
  width: 100%;
  margin: 0 auto;
  text-align: center;
  display: none;
}

/* modal-boxes */
.modal-box{
  display: none;
  width: 100%;
  height: 100%;
  position: fixed;
  top: 0;
  left: 0;
  background-color: rgba(0, 0, 0, 0.8); /* slightly darker background */
  overflow: auto;
  z-index: 9999;
}

.modal-box-content{
  position: absolute;
  text-align: center;
  width: 80%;        /* increase width */
  max-width: 900px;  /* optional: limit max width */
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: fadeIn 0.5s ease-in-out forwards;
  margin-top: 100px;
}

.modal-box-content > img{
  width: 100%;   /* fill the modal content */
  height: auto;  /* maintain aspect ratio */
  border: 2px solid rgb(35, 42, 52);
  border-radius: 4px;
}


@keyframes fadeIn {
  from { 
    opacity: 0;
  }

  to {
    opacity: 1;
  }
}

.modal-box-content img:hover{
  opacity: 1;
}

.close-box{
  color: white;
  position: absolute;
  right: 0;
  top: 0;
  z-index: 1;
  cursor: pointer;
  font-weight: 900 !important;
  font-size: 2rem !important;
  background-color: black;
  padding: 0 14px;
}

.close-box:hover{
  color: red;
}
